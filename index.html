<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>visield</title>
<style>
body { font-family: Arial; background:#111; color:#fff; text-align:center; }
button { padding:10px 20px; font-size:18px; cursor:pointer; }
.container { max-width:700px; margin:auto; }
.answers { display:flex; justify-content:center; align-items:center; gap:18px; margin-top:30px; }
.circle { border-radius:50%; border:2px solid white; display:flex; align-items:center; justify-content:center; cursor:pointer; transition: all 0.2s ease; opacity:0.85; }
.circle:hover { transform: scale(1.1); }
.size-1, .size-5 { width:64px; height:64px; }
.size-2, .size-4 { width:52px; height:52px; }
.size-3 { width:40px; height:40px; }
.val-1 { background:#b91c1c; }
.val-2 { background:#ef4444; }
.val-3 { background:#6b7280; }
.val-4 { background:#22c55e; }
.val-5 { background:#15803d; }
.selected { outline:3px solid white; opacity:1; }
.nav { margin-top:30px; display:flex; justify-content:space-between; }
.progress { height:10px; background:#333; margin-top:20px; }
.progress-bar { height:10px; background:#22c55e; width:0%; }
</style>
</head>
<body>
<div class="container" id="app">
<h1>yo fam what worst member are you fr cuh twin gng</h1>
<button onclick="startQuiz()">Start Quiz</button>
</div>
<script>

const TRAITS = [
"expressiveHumor",
"emotionalSensitivity",
"externalWarmth",
"socialEnergy",
"assertiveness",
"emotionalStability",
"cynicism",
"focusDiscipline",
"confidence",
"impulsiveness"
];


let questions = [
{ text:"I often use humor, sarcasm, or jokes in conversation.", map:{expressiveHumor:1, cynicism:0.3}},
{ text:"I tend to notice and absorb other people's emotions.", map:{emotionalSensitivity:1}},
{ text:"I naturally behave warmly and make others feel welcome.", map:{externalWarmth:1}},
{ text:"I enjoy being in active social environments.", map:{socialEnergy:1}},
{ text:"I usually take charge when no one else does.", map:{assertiveness:1}},
{ text:"I stay calm even when things go wrong.", map:{emotionalStability:1}},
{ text:"I often expect negative outcomes from people or situations.", map:{cynicism:1}},
{ text:"I prefer structure, planning, and consistency.", map:{focusDiscipline:1}},
{ text:"I feel confident in my abilities most of the time.", map:{confidence:1}},
{ text:"I act quickly without thinking too much.", map:{impulsiveness:1}},
{ text:"I enjoy playful teasing or light mischief.", map:{expressiveHumor:0.7, impulsiveness:0.4}},
{ text:"I get emotionally overwhelmed in stressful situations.", map:{emotionalSensitivity:0.7, emotionalStability:-0.8}},
{ text:"I actively try to help others even if it’s inconvenient.", map:{externalWarmth:0.9, focusDiscipline:0.3}},
{ text:"I enjoy being noticed or standing out in groups.", map:{socialEnergy:0.8, confidence:0.6}},
{ text:"I prefer solving problems logically rather than emotionally.", map:{focusDiscipline:0.8, emotionalSensitivity:-0.4}},
{ text:"I get irritated easily when things don’t go my way.", map:{cynicism:0.6, emotionalStability:-0.7}},
{ text:"I feel responsible for protecting or guiding others.", map:{externalWarmth:0.7, assertiveness:0.5}},
{ text:"I often second-guess myself.", map:{confidence:-1, emotionalSensitivity:0.5}},
{ text:"I prefer quiet or calm environments over busy ones.", map:{socialEnergy:-0.9}},
{ text:"I enjoy expressing myself creatively or dramatically.", map:{expressiveHumor:0.8, socialEnergy:0.3}},
{ text:"I tend to overthink situations after they happen.", map:{emotionalSensitivity:0.6, focusDiscipline:0.5}},
{ text:"I stick strongly to my decisions once I make them.", map:{assertiveness:0.8, confidence:0.4}},
{ text:"I enjoy taking risks without worrying about consequences.", map:{impulsiveness:0.9, confidence:0.2}},
{ text:"I often feel unsure about my choices.", map:{confidence:-0.9}},
{ text:"I like keeping things clean, organized, or structured.", map:{focusDiscipline:1}},
{ text:"I enjoy emotionally supporting other people.", map:{externalWarmth:0.9}},
{ text:"I enjoy competition or being tested.", map:{confidence:0.7, assertiveness:0.5}},
{ text:"My mood changes quickly depending on situations.", map:{emotionalStability:-1}},
{ text:"I enjoy talking and interacting with many people.", map:{socialEnergy:1}},
{ text:"I prefer working alone rather than in groups.", map:{socialEnergy:-0.9}},
{ text:"I joke even when the situation is serious.", map:{expressiveHumor:0.9}},
{ text:"I feel uncomfortable when I am ignored.", map:{socialEnergy:0.6, emotionalSensitivity:0.4}},
{ text:"I trust my instincts more than careful planning.", map:{impulsiveness:0.7, confidence:0.4}},
{ text:"I tend to assume people have selfish motivations.", map:{cynicism:1}},
{ text:"I try to avoid being the center of attention.", map:{socialEnergy:-0.6, confidence:-0.4}},
{ text:"I feel comfortable leading or directing others.", map:{assertiveness:1}},
{ text:"I prefer predictable situations over chaotic ones.", map:{focusDiscipline:0.6, emotionalStability:0.4}},
{ text:"I often help others without being asked.", map:{externalWarmth:1}}
];

let current = 0;
let answers = new Array(questions.length).fill(null);

function startQuiz(){ renderQuestion(); }

function renderQuestion(){
let q = questions[current];
let html = `<h2>Question ${current+1}/${questions.length}</h2><p>${q.text}</p><div class=\"answers\">`;
for(let i=1;i<=5;i++){
let sizeClass = `size-${i}`;
let valClass = `val-${i}`;
let selected = answers[current]===i ? 'selected' : '';
html += `<div class=\"circle ${sizeClass} ${valClass} ${selected}\" onclick=\"select(${i})\">${i}</div>`;
}
html += `</div><div class=\"nav\"><button onclick=\"prev()\">←</button><button onclick=\"next()\">→</button></div><div class=\"progress\"><div class=\"progress-bar\" style=\"width:${((current+1)/questions.length)*100}%\"></div></div>`;
document.getElementById("app").innerHTML = html;
}

function select(val){
answers[current]=val;
renderQuestion();
setTimeout(()=>{
if(current < questions.length-1){ current++; renderQuestion(); }
else showResults();
},120);
}

function next(){ if(current < questions.length-1){ current++; renderQuestion(); } else showResults(); }
function prev(){ if(current>0){ current--; renderQuestion(); } }

function normalize(v){ return (v-3)/2; }

function buildUserVector(){
let user = {};
TRAITS.forEach(t=>user[t]=0);

questions.forEach((q,i)=>{
let ans = answers[i];
if(ans===null) return;
let val = normalize(ans);
for(let trait in q.map){
user[trait] += val * q.map[trait];
}
});
return user;
}

function cosineSimilarity(a,b){
let dot=0, magA=0, magB=0;
for(let k in a){
let av=a[k]||0;
let bv=b[k]||0;
dot+=av*bv;
magA+=av*av;
magB+=bv*bv;
}
if(!magA||!magB) return 0;
return dot/(Math.sqrt(magA)*Math.sqrt(magB));
}

async function showResults(){
let data = await fetch('vectors.json').then(r=>r.json());
let user = buildUserVector();

let scores = data.map(c=>{
let sim = cosineSimilarity(user,c.traits);
return {name:c.name,score:sim};
});

scores.sort((a,b)=>b.score-a.score);

let html = `<h2>Your Results</h2>`;

scores.forEach((c,i)=>{
let pct = ((c.score+1)/2)*100;
pct = Math.max(0,Math.min(100,pct));
html += `<p>${i+1}. ${c.name} - ${pct.toFixed(1)}%</p><div class=\"progress\"><div class=\"progress-bar\" style=\"width:${pct}%\"></div></div>`;
});

document.getElementById("app").innerHTML = html;
}

</script>
</body>
</html>
